<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google 로그인 - Auto Input</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  </head>
  <body class="simple-page">
    <main>
      <a class="brand" href="./index.html" aria-label="Auto Input 홈">
        <span class="brand-mark">AI</span>
        <span>Auto Input</span>
      </a>
      <h1>Auto Input 로그인</h1>
      <p id="message">Google 계정으로 로그인하면 PC 앱에 자동으로 연결됩니다.</p>
      <button class="button primary" id="login-button" type="button">Google로 계속하기</button>
    </main>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCVBuWpcrq9OXEWtIuuf59KbqCveTl31DI",
        authDomain: "auto-web-8f2de.firebaseapp.com",
        projectId: "auto-web-8f2de",
        storageBucket: "auto-web-8f2de.firebasestorage.app",
        messagingSenderId: "18767243176",
        appId: "1:18767243176:web:f2a910dc9e4a36dcbbdf9d",
        measurementId: "G-7MY8T0TC11"
      };

      const params = new URLSearchParams(location.search);
      const sessionId = params.get("session") || "";
      const message = document.getElementById("message");
      const button = document.getElementById("login-button");

      firebase.initializeApp(firebaseConfig);

      function setMessage(text) {
        message.textContent = text;
      }

      async function completeLogin(user) {
        const idToken = await user.getIdToken();
        const response = await fetch("/desktop-login-complete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId, idToken })
        });
        if (!response.ok) {
          const result = await response.json().catch(() => ({}));
          throw new Error(result.error || "PC 앱 로그인 연결에 실패했습니다.");
        }
        setMessage("로그인이 완료되었습니다. PC 앱으로 돌아가 주세요.");
        button.hidden = true;
      }

      async function finishRedirectLogin() {
        try {
          const result = await firebase.auth().getRedirectResult();
          if (result.user) {
            button.disabled = true;
            setMessage("Google 로그인 결과를 PC 앱에 연결하는 중입니다.");
            await completeLogin(result.user);
          }
        } catch (error) {
          setMessage(`로그인 실패: ${error.message}`);
        }
      }

      button.addEventListener("click", async () => {
        if (!/^[a-zA-Z0-9_-]{20,80}$/.test(sessionId)) {
          setMessage("로그인 세션이 올바르지 않습니다. PC 앱에서 다시 시도해 주세요.");
          return;
        }

        button.disabled = true;
        setMessage("Google 로그인 창을 여는 중입니다.");
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: "select_account" });
          try {
            const result = await firebase.auth().signInWithPopup(provider);
            await completeLogin(result.user);
          } catch (popupError) {
            if (
              popupError.code === "auth/popup-blocked" ||
              popupError.code === "auth/popup-closed-by-user" ||
              popupError.code === "auth/cancelled-popup-request"
            ) {
              setMessage("Google 로그인 페이지로 이동합니다.");
              await firebase.auth().signInWithRedirect(provider);
              return;
            }
            throw popupError;
          }
        } catch (error) {
          button.disabled = false;
          setMessage(`로그인 실패: ${error.message}`);
        }
      });

      finishRedirectLogin();
    </script>
  </body>
</html>
