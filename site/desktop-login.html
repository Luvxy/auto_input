<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google 로그인 - Auto Input</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  </head>
  <body class="simple-page">
    <main>
      <a class="brand" href="./index.html" aria-label="Auto Input 홈">
        <span class="brand-mark">AI</span>
        <span>Auto Input</span>
      </a>
      <p class="eyebrow" id="status-label">Google 로그인</p>
      <h1 id="title">Auto Input에 연결하기</h1>
      <p id="message">Google 계정으로 로그인하면 PC 앱에 자동으로 연결됩니다.</p>
      <button class="button primary" id="login-button" type="button">Google로 계속하기</button>
      <p class="login-note" id="note">로그인이 끝나면 이 창은 닫아도 됩니다.</p>
    </main>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCVBuWpcrq9OXEWtIuuf59KbqCveTl31DI",
        authDomain: "auto-web-8f2de.firebaseapp.com",
        projectId: "auto-web-8f2de",
        storageBucket: "auto-web-8f2de.firebasestorage.app",
        messagingSenderId: "18767243176",
        appId: "1:18767243176:web:f2a910dc9e4a36dcbbdf9d",
        measurementId: "G-7MY8T0TC11"
      };

      const params = new URLSearchParams(location.search);
      const sessionId = params.get("session") || "";
      const statusLabel = document.getElementById("status-label");
      const title = document.getElementById("title");
      const message = document.getElementById("message");
      const button = document.getElementById("login-button");
      const note = document.getElementById("note");
      let loginCompleted = false;

      firebase.initializeApp(firebaseConfig);

      function setMessage(text) {
        message.textContent = text;
      }

      function hasValidSession() {
        return /^[a-zA-Z0-9_-]{20,80}$/.test(sessionId);
      }

      function showCompleted() {
        statusLabel.textContent = "연결 완료";
        title.textContent = "로그인이 완료되었습니다";
        setMessage("이제 Auto Input PC 앱으로 돌아가세요. 앱이 몇 초 안에 로그인 상태로 바뀝니다.");
        note.textContent = "PC 앱에서 로그인됨으로 표시되면 이 창은 닫아도 됩니다.";
        button.hidden = true;
        button.disabled = true;
        document.body.classList.add("login-complete");
      }

      async function completeLogin(user) {
        if (loginCompleted || !user) return;
        if (!hasValidSession()) {
          setMessage("로그인 세션이 올바르지 않습니다. PC 앱에서 다시 시도해 주세요.");
          return;
        }

        loginCompleted = true;
        button.disabled = true;
        statusLabel.textContent = "연결 중";
        setMessage("Google 로그인 정보를 PC 앱에 연결하는 중입니다.");

        try {
          const idToken = await user.getIdToken(true);
          const response = await fetch("/desktop-login-complete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ sessionId, idToken })
          });
          if (!response.ok) {
            const result = await response.json().catch(() => ({}));
            throw new Error(result.error || "PC 앱 로그인 연결에 실패했습니다.");
          }
          showCompleted();
        } catch (error) {
          loginCompleted = false;
          button.disabled = false;
          statusLabel.textContent = "연결 실패";
          setMessage(`로그인 연결 실패: ${error.message}`);
        }
      }

      async function finishRedirectLogin() {
        try {
          const result = await firebase.auth().getRedirectResult();
          if (result.user) {
            await completeLogin(result.user);
          }
        } catch (error) {
          statusLabel.textContent = "로그인 실패";
          setMessage(`로그인 실패: ${error.message}`);
        }
      }

      firebase.auth().onAuthStateChanged(async (user) => {
        if (!user || loginCompleted) return;
        await completeLogin(user);
      });

      button.addEventListener("click", async () => {
        if (!hasValidSession()) {
          setMessage("로그인 세션이 올바르지 않습니다. PC 앱에서 다시 시도해 주세요.");
          return;
        }

        button.disabled = true;
        statusLabel.textContent = "로그인 중";
        setMessage("Google 로그인 창을 여는 중입니다.");
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          provider.setCustomParameters({ prompt: "select_account" });
          try {
            const result = await firebase.auth().signInWithPopup(provider);
            await completeLogin(result.user);
          } catch (popupError) {
            if (
              popupError.code === "auth/popup-blocked" ||
              popupError.code === "auth/popup-closed-by-user" ||
              popupError.code === "auth/cancelled-popup-request"
            ) {
              setMessage("Google 로그인 페이지로 이동합니다.");
              await firebase.auth().signInWithRedirect(provider);
              return;
            }
            throw popupError;
          }
        } catch (error) {
          button.disabled = false;
          statusLabel.textContent = "로그인 실패";
          setMessage(`로그인 실패: ${error.message}`);
        }
      });

      finishRedirectLogin();
    </script>
  </body>
</html>
